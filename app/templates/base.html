<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Ted &amp; Linda's Stories{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <a href="/" class="site-brand">
      <span class="site-brand__ornament">&curren;</span>
      <span class="site-brand__text">Ted &amp; Linda's Stories</span>
      <span class="site-brand__ornament">&curren;</span>
    </a>
    <p class="site-brand__tagline">A family collection of memories &amp; adventures</p>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-ornament">&loz;</span>
      <p>Stories by Ted &amp; Linda &mdash; A family collection</p>
      <span class="footer-ornament">&loz;</span>
    </div>
  </footer>
</body>
</html>
